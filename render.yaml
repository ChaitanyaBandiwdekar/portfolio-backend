services:
  - type: web
    name: portfolio-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    # healthCheckPath behavior on the free plan is not officially documented —
    # don't depend on it for keep-alive; the GitHub Actions cron is the real
    # keep-alive mechanism (see .github/workflows/keep-alive.yml).
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.0
      - key: ENV
        value: production
      - key: GOOGLE_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: LANGSMITH_API_KEY
        sync: false
      - key: LANGSMITH_TRACING
        value: "true"
      - key: LANGSMITH_PROJECT
        value: portfolio-backend
      - key: GEMINI_CHAT_MODEL
        value: gemini-flash-lite-latest
      # Comma-separated exact origins allowed to call the API. Set the real
      # deployed frontend origin(s) in the Render dashboard before going live;
      # left as sync: false (no default here) so CORS never accidentally
      # opens up via a placeholder value.
      - key: ALLOWED_ORIGINS
        sync: false
